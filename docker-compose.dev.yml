# 로컬 개발용 오버라이드 — 코드 저장 시 백엔드 자동 재시작
#
#   docker compose -f docker-compose.yml -f docker-compose.dev.yml up --build
#
# 프론트는 Vite HMR이 빠르므로 호스트에서:
#   cd webapp/frontend && npm install && npm run dev
#   → http://localhost:5173  (/api 는 vite.config.ts 프록시 → 8088)
#
# 시연·배포형(정적 nginx)만 쓸 때는:
#   docker compose up --build
#   → http://localhost:8080

services:
  hades-backend:
    command:
      [
        "uvicorn",
        "main:app",
        "--host",
        "0.0.0.0",
        "--port",
        "8088",
        "--reload",
        "--reload-dir",
        "/app/webapp/backend",
        "--reload-dir",
        "/app/demo",
      ]
    volumes:
      - ${TTT_MODEL_DIR:-./.docker_empty_models}:/models:ro
      - marketplace-data:/app/webapp/backend/data/runtime
      - ./webapp/backend:/app/webapp/backend
      - ./demo:/app/demo

  # 개발 중에는 nginx 프론트 컨테이너를 켜지 않아도 됨(포트 충돌 방지).
  # 호스트에서 `npm run dev` 로 대체하는 것을 권장합니다.
  hades-web:
    profiles:
      - demo-static
