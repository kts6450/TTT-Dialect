# ════════════════════════════════════════════════════════════
# TTT × 노인·방언 음성 인식 시스템 - 설정 파일
# ════════════════════════════════════════════════════════════

model:
  base: "openai/whisper-small"          # whisper-tiny / small / medium
  language: "ko"
  task: "transcribe"

  # TTT 적응 레이어 설정
  ttt:
    trainable_layers: ["encoder.layers.11", "decoder.layers.11"]  # 상위 레이어만 업데이트
    learning_rate: 1.0e-4
    adaptation_steps: 30                # 사용자 캘리브레이션 시 학습 스텝 수
    warmup_steps: 5
    gradient_clip: 1.0

finetune:
  # AI Hub 데이터 초기 파인튜닝
  learning_rate: 5.0e-5
  batch_size: 8
  num_epochs: 3
  warmup_ratio: 0.1
  weight_decay: 0.01
  eval_steps: 500
  save_steps: 1000
  output_dir: "F:/TTT-data/checkpoints/finetune"

data:
  sample_rate: 16000                    # Whisper 표준 샘플링 레이트
  max_duration_sec: 30
  min_duration_sec: 0.5
  calibration_sentences: 20            # 사용자 캘리브레이션 문장 수

  # AI Hub 데이터 경로 (다운로드 후 설정)
  aihub_dialect_path: "./data/raw/dialect"
  aihub_elderly_path: "./data/raw/elderly"
  processed_path: "./data/processed"

  dialects:
    - "경상"
    - "전라"
    - "충청"
    - "강원"
    - "제주"
    - "서울"

user:
  profile_dir: "./data/user_profiles"
  min_adaptation_samples: 5            # 최소 적응 샘플 수

evaluation:
  test_ratio: 0.1
  metrics: ["wer", "cer"]
  output_dir: "./evaluation/results"

logging:
  level: "INFO"
  file: "./logs/ttt.log"
